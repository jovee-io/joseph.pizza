<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>joseph.pizza</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060608; overflow: hidden; }
    canvas { display: block; image-rendering: pixelated; }
    #slit-marker {
      position: fixed; top: 0; width: 1px; height: 100%;
      background: rgba(255,255,255,0.05); pointer-events: none;
    }
  </style>
</head>
<body>
<div id="slit-marker"></div>
<canvas id="main"></canvas>
<script>
  const canvas = document.getElementById('main');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const W = canvas.width;
  const H = canvas.height;
  const slitMarker = document.getElementById('slit-marker');

  // =====================================================
  // PARAMETERS
  // =====================================================
  const PIZZA_COUNT    = 5;
  const PIZZA_RADIUS   = 100;
  const NOISE_AMOUNT   = 28;     // softer texture on the pizza itself
  const BG_COLOR       = '#060608';
  const VERTICAL_DRIFT = 180;    // a bit more room to drip
  const GLITCH_CHANCE  = 0.008;  // rare, not constant
  const SLIT_BASE      = Math.floor(W * 0.40);
  const SLIT_WANDER    = 100;

  // Drip wave — how far the slow organic wave displaces columns
  const DRIP_AMPLITUDE = 90;     // pixels of wave displacement
  const DRIP_FREQUENCY = 0.003;  // how many wave cycles per column

  // =====================================================
  // HELPERS
  // =====================================================
  function randInt(a, b)   { return Math.floor(a + Math.random() * (b - a)); }

  function makeSmoother(speed, lo=20, hi=80) {
    let cur=0, tgt=0, timer=0;
    return () => {
      if (--timer <= 0) { tgt = Math.random()*2-1; timer = randInt(lo,hi); }
      cur += (tgt-cur)*speed;
      return cur;
    };
  }

  // =====================================================
  // NEON PALETTES
  // =====================================================
  const NEON_HUES = [
    [300,330],[170,200],[50,80],[260,290],[10,35],[120,150],[220,250]
  ];

  function makeNeonPalette() {
    const hues  = NEON_HUES[randInt(0, NEON_HUES.length)];
    const h     = randInt(hues[0], hues[1]);
    const h2    = (h + randInt(40,100)) % 360;
    return {
      crust:      `hsl(${h},100%,55%)`,
      crustRing:  `hsl(${h},100%,28%)`,
      sauce:      `hsl(${h2},100%,50%)`,
      cheese:     `hsl(${(h+15)%360},100%,65%)`,
      cheeseBlob: `hsl(${(h+25)%360},100%,75%)`,
      pepperoni:  `hsl(${(h2+40)%360},90%,62%)`,
      outline:    `hsl(${h},80%,12%)`,
    };
  }

  // =====================================================
  // DRAW PIZZA
  // =====================================================
  function drawPizza(ctx, cx, cy, r, p) {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = p.crust; ctx.fill();

    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle = p.crustRing; ctx.lineWidth=13; ctx.stroke();

    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle = p.outline; ctx.lineWidth=3; ctx.stroke();

    ctx.beginPath(); ctx.arc(cx,cy,r*0.82,0,Math.PI*2);
    ctx.fillStyle = p.sauce; ctx.fill();

    ctx.beginPath(); ctx.arc(cx,cy,r*0.78,0,Math.PI*2);
    ctx.fillStyle = p.cheese; ctx.fill();

    [{dx:-.2,dy:-.3,rx:.28,ry:.18,a:.4},{dx:.3,dy:.1,rx:.22,ry:.16,a:-.3},
     {dx:-.1,dy:.35,rx:.25,ry:.14,a:.8},{dx:.1,dy:-.1,rx:.3,ry:.2,a:.1}]
    .forEach(b => {
      ctx.save(); ctx.translate(cx+r*b.dx, cy+r*b.dy); ctx.rotate(b.a);
      ctx.beginPath(); ctx.ellipse(0,0,r*b.rx,r*b.ry,0,0,Math.PI*2);
      ctx.fillStyle=p.cheeseBlob; ctx.fill(); ctx.restore();
    });

    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(a)*r*.95, cy+Math.sin(a)*r*.95);
      ctx.strokeStyle=p.outline; ctx.lineWidth=2; ctx.stroke();
    }

    [{dx:0,dy:-.45},{dx:.42,dy:-.22},{dx:.42,dy:.22},
     {dx:0,dy:.45},{dx:-.42,dy:.22},{dx:-.42,dy:-.22},{dx:0,dy:0}]
    .forEach(pp => {
      const px=cx+r*pp.dx, py=cy+r*pp.dy, pr=r*.12;
      ctx.beginPath(); ctx.arc(px+1.5,py+1.5,pr,0,Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fill();
      ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2);
      ctx.fillStyle=p.pepperoni; ctx.fill();
      ctx.beginPath(); ctx.arc(px-pr*.3,py-pr*.3,pr*.35,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.28)'; ctx.fill();
      ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2);
      ctx.strokeStyle=p.outline; ctx.lineWidth=1.5; ctx.stroke();
    });

    // noise
    const id=ctx.getImageData(Math.floor(cx-r),Math.floor(cy-r),Math.ceil(r*2),Math.ceil(r*2));
    const d=id.data;
    for(let i=0;i<d.length;i+=4){
      if(d[i+3]>0){
        const n=(Math.random()-.5)*NOISE_AMOUNT;
        d[i]=Math.min(255,Math.max(0,d[i]+n));
        d[i+1]=Math.min(255,Math.max(0,d[i+1]+n));
        d[i+2]=Math.min(255,Math.max(0,d[i+2]+n));
      }
    }
    ctx.putImageData(id,Math.floor(cx-r),Math.floor(cy-r));
  }

  // =====================================================
  // PIZZA OBJECTS
  // =====================================================
  const pSize = (PIZZA_RADIUS+30)*2;

  function makePizza(index) {
    const off  = document.createElement('canvas');
    off.width  = pSize; off.height = pSize;
    const oCtx = off.getContext('2d');
    const r    = PIZZA_RADIUS + randInt(-18,18);
    const laneH = H / PIZZA_COUNT;
    const y    = laneH*index + laneH*0.5 + randInt(-25,25);
    const pal  = makeNeonPalette();
    drawPizza(oCtx, pSize/2, pSize/2, r, pal);
    return {
      off, oCtx, r, y, pal,
      x: -pSize/2 - randInt(0, W),  // staggered starts
      speedNoise: makeSmoother(0.025+Math.random()*.02, 15, 70),
    };
  }

  const pizzas = Array.from({length:PIZZA_COUNT}, (_,i) => makePizza(i));

  // =====================================================
  // SLIT + COLUMN STORE
  // =====================================================
  const slitNoise  = makeSmoother(0.012, 30, 100);
  const driftNoise = makeSmoother(0.018, 20, 80);

  // Drip noise — very slow, very smooth
  const dripNoise  = makeSmoother(0.008, 60, 180);
  let   dripPhase  = 0;

  // Angle noise — slowly rotates the drift direction
  // Output maps to an angle in radians, wandering through all directions
  // Very slow so the fan-out sweeps lazily rather than spinning
  const angleNoise = makeSmoother(0.006, 80, 200);
  let   anglePhase = 0;  // a second slow sine for the angle, independent of drip

  let slitX = SLIT_BASE;

  // Global column store — composite of ALL pizzas at the slit each frame
  const cols = [];

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width=W; tempCanvas.height=H;
  const tempCtx = tempCanvas.getContext('2d');

  // =====================================================
  // MAIN LOOP
  // =====================================================
  function frame() {

    // Update slit
    slitX = Math.floor(SLIT_BASE + slitNoise() * SLIT_WANDER);
    slitMarker.style.left = slitX + 'px';

    // Draw all pizzas to temp canvas
    tempCtx.clearRect(0,0,W,H);

    pizzas.forEach(p => {
      let speed = 0.5 + p.speedNoise() * 2.6;
      if (Math.random() < 0.006) speed *= -2.8; // lurch back
      p.x += speed;

      // Reset off right or far left
      if (p.x - p.r > W+30 || p.x + p.r < -W*.4) {
        p.x   = -pSize/2 - randInt(0,80);
        p.pal = makeNeonPalette();
        p.oCtx.clearRect(0,0,pSize,pSize);
        drawPizza(p.oCtx, pSize/2, pSize/2, p.r, p.pal);
      }

      tempCtx.drawImage(p.off, Math.floor(p.x-pSize/2), Math.floor(p.y-pSize/2));
    });

    // Advance phases
    dripPhase  += 0.012;
    anglePhase += 0.007;  // slower than drip — angle turns lazily

    // Current drift magnitude — how far columns get displaced total
    const dripMag = Math.sin(dripPhase) * DRIP_AMPLITUDE * (0.5 + Math.abs(dripNoise()) * 0.8);

    // Current drift angle — smoothly wanders through directions
    // We bias toward downward (positive Y) but let it swing wide
    // Range: roughly -PI to PI, but sin-shaped so it spends time in each zone
    const angle = Math.sin(anglePhase) * Math.PI * (0.6 + Math.abs(angleNoise()) * 0.5);

    // Decompose into x and y components, baked into each column at capture
    const dripX = Math.cos(angle) * dripMag;
    const dripY = Math.sin(angle) * dripMag;

    // Capture composite slit column
    const slitData = tempCtx.getImageData(slitX, 0, 1, H);
    const pixels   = new Uint8ClampedArray(slitData.data);
    cols.push({ pixels, dripX, dripY });

    // Keep store bounded
    const maxCols = W - Math.min(slitX, W-10) + 20;
    if (cols.length > maxCols) cols.shift();

    // --- Render ---
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0,0,W,H);

    const total    = cols.length;
    const driftMod = 1 + driftNoise() * 0.55;

    for (let i=0; i<total; i++) {
      const col = cols[i];
      const age = total-1-i;

      // Base slit-scan x position — columns fan rightward from slit
      // Now also shifted by the x component of the drift angle
      const baseDriftX = (age / (PIZZA_RADIUS*2)) * VERTICAL_DRIFT * driftMod;
      const drawX = Math.floor(slitX + (total-1-i) + 1 + col.dripX);
      if (drawX >= W || drawX < 0) continue;

      // Y displacement: base linear drift + the angled drip component
      const baseDriftY = (age / (PIZZA_RADIUS*2)) * VERTICAL_DRIFT * driftMod;
      const driftY     = Math.floor(baseDriftY + col.dripY);

      const id  = ctx.createImageData(1,H);
      const dst = id.data;

      const src = (Math.random() < GLITCH_CHANCE && i > 3)
        ? cols[i - randInt(1,4)].pixels
        : col.pixels;

      for (let y=0; y<H; y++) {
        const srcY = y - driftY;
        if (srcY<0 || srcY>=H) continue;
        const si=srcY*4, di=y*4;
        dst[di]=src[si]; dst[di+1]=src[si+1]; dst[di+2]=src[si+2]; dst[di+3]=src[si+3];
      }

      ctx.putImageData(id, drawX, 0);
    }

    // Live pizzas, clipped left of slit
    ctx.save();
    ctx.beginPath(); ctx.rect(0,0,slitX,H); ctx.clip();
    ctx.drawImage(tempCanvas,0,0);
    ctx.restore();

    // Ghost slit line
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.fillRect(slitX,0,1,H);

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);

  window.addEventListener('resize', () => {
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  });
</script>
</body>
</html>
