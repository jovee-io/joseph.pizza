<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>joseph.pizza</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060608; overflow: hidden; }
    canvas { display: block; image-rendering: pixelated; }
    #slit-marker {
      position: fixed; top: 0; width: 1px; height: 100%;
      background: rgba(255,255,255,0.05); pointer-events: none;
    }
  </style>
</head>
<body>
<div id="slit-marker"></div>
<canvas id="main"></canvas>
<script>
  const canvas = document.getElementById('main');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const W = canvas.width;
  const H = canvas.height;
  const slitMarker = document.getElementById('slit-marker');

  // =====================================================
  // PARAMETERS
  // =====================================================
  const PIZZA_COUNT  = 5;
  const PIZZA_RADIUS = 100;
  const NOISE_AMOUNT = 28;
  const BG_COLOR     = '#060608';
  const SLIT_X       = Math.floor(W * 0.35);

  // =====================================================
  // HELPERS
  // =====================================================
  function randInt(a, b)   { return Math.floor(a + Math.random() * (b - a)); }

  function makeSmoother(speed, lo=20, hi=80) {
    let cur=0, tgt=0, timer=0;
    return () => {
      if (--timer <= 0) { tgt = Math.random()*2-1; timer = randInt(lo,hi); }
      cur += (tgt-cur)*speed;
      return cur;
    };
  }

  // =====================================================
  // NEON PALETTES
  // =====================================================
  const NEON_HUES = [
    [300,330],[170,200],[50,80],[260,290],[10,35],[120,150],[220,250]
  ];

  function makeNeonPalette() {
    const hues  = NEON_HUES[randInt(0, NEON_HUES.length)];
    const h     = randInt(hues[0], hues[1]);
    const h2    = (h + randInt(40,100)) % 360;
    return {
      crust:      `hsl(${h},100%,55%)`,
      crustRing:  `hsl(${h},100%,28%)`,
      sauce:      `hsl(${h2},100%,50%)`,
      cheese:     `hsl(${(h+15)%360},100%,65%)`,
      cheeseBlob: `hsl(${(h+25)%360},100%,75%)`,
      pepperoni:  `hsl(${(h2+40)%360},90%,62%)`,
      outline:    `hsl(${h},80%,12%)`,
    };
  }

  // =====================================================
  // DRAW PIZZA
  // =====================================================
  function drawPizza(ctx, cx, cy, r, p) {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = p.crust; ctx.fill();

    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle = p.crustRing; ctx.lineWidth=13; ctx.stroke();

    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle = p.outline; ctx.lineWidth=3; ctx.stroke();

    ctx.beginPath(); ctx.arc(cx,cy,r*0.82,0,Math.PI*2);
    ctx.fillStyle = p.sauce; ctx.fill();

    ctx.beginPath(); ctx.arc(cx,cy,r*0.78,0,Math.PI*2);
    ctx.fillStyle = p.cheese; ctx.fill();

    [{dx:-.2,dy:-.3,rx:.28,ry:.18,a:.4},{dx:.3,dy:.1,rx:.22,ry:.16,a:-.3},
     {dx:-.1,dy:.35,rx:.25,ry:.14,a:.8},{dx:.1,dy:-.1,rx:.3,ry:.2,a:.1}]
    .forEach(b => {
      ctx.save(); ctx.translate(cx+r*b.dx, cy+r*b.dy); ctx.rotate(b.a);
      ctx.beginPath(); ctx.ellipse(0,0,r*b.rx,r*b.ry,0,0,Math.PI*2);
      ctx.fillStyle=p.cheeseBlob; ctx.fill(); ctx.restore();
    });

    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(a)*r*.95, cy+Math.sin(a)*r*.95);
      ctx.strokeStyle=p.outline; ctx.lineWidth=2; ctx.stroke();
    }

    // Pepperoni — random count, scattered positions, varied sizes and squash
    const pepCount = randInt(5, 14);
    const maxPlaceRadius = r * 0.68; // stay within the cheese

    // Use rejection sampling to scatter them without too much overlap
    const placed = [];
    let attempts = 0;
    while (placed.length < pepCount && attempts < 200) {
      attempts++;
      // Random polar position within the cheese area
      const dist  = Math.sqrt(Math.random()) * maxPlaceRadius;
      const angle = Math.random() * Math.PI * 2;
      const px    = cx + Math.cos(angle) * dist;
      const py    = cy + Math.sin(angle) * dist;
      const pr    = r * (0.07 + Math.random() * 0.09); // varied radius
      const squashX = 0.7 + Math.random() * 0.6;       // horizontal squash
      const squashY = 0.7 + Math.random() * 0.6;       // vertical squash
      const tilt  = Math.random() * Math.PI;            // random rotation

      // Reject if too close to an existing pepperoni
      const tooClose = placed.some(q => {
        const dx = px - q.px, dy = py - q.py;
        return Math.sqrt(dx*dx + dy*dy) < pr + q.pr + 2;
      });
      if (!tooClose) placed.push({ px, py, pr, squashX, squashY, tilt });
    }

    placed.forEach(({ px, py, pr, squashX, squashY, tilt }) => {
      // Shadow
      ctx.save();
      ctx.translate(px+1.5, py+1.5);
      ctx.rotate(tilt);
      ctx.beginPath();
      ctx.ellipse(0, 0, pr*squashX, pr*squashY, 0, 0, Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fill();
      ctx.restore();

      // Main disc
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(tilt);
      ctx.beginPath();
      ctx.ellipse(0, 0, pr*squashX, pr*squashY, 0, 0, Math.PI*2);
      ctx.fillStyle=p.pepperoni; ctx.fill();
      ctx.restore();

      // Highlight
      ctx.save();
      ctx.translate(px - pr*.3, py - pr*.3);
      ctx.rotate(tilt);
      ctx.beginPath();
      ctx.ellipse(0, 0, pr*squashX*.35, pr*squashY*.35, 0, 0, Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.28)'; ctx.fill();
      ctx.restore();

      // Outline
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(tilt);
      ctx.beginPath();
      ctx.ellipse(0, 0, pr*squashX, pr*squashY, 0, 0, Math.PI*2);
      ctx.strokeStyle=p.outline; ctx.lineWidth=1.5; ctx.stroke();
      ctx.restore();
    });

    // noise
    const id=ctx.getImageData(Math.floor(cx-r),Math.floor(cy-r),Math.ceil(r*2),Math.ceil(r*2));
    const d=id.data;
    for(let i=0;i<d.length;i+=4){
      if(d[i+3]>0){
        const n=(Math.random()-.5)*NOISE_AMOUNT;
        d[i]=Math.min(255,Math.max(0,d[i]+n));
        d[i+1]=Math.min(255,Math.max(0,d[i+1]+n));
        d[i+2]=Math.min(255,Math.max(0,d[i+2]+n));
      }
    }
    ctx.putImageData(id,Math.floor(cx-r),Math.floor(cy-r));
  }

  // =====================================================
  // PIZZA OBJECTS
  // =====================================================
  const pSize = (PIZZA_RADIUS+30)*2;

  function makePizza(index) {
    const off  = document.createElement('canvas');
    off.width  = pSize; off.height = pSize;
    const oCtx = off.getContext('2d');
    const r    = PIZZA_RADIUS + randInt(-18,18);
    const laneH = H / PIZZA_COUNT;
    const y    = laneH*index + laneH*0.5 + randInt(-25,25);
    const pal  = makeNeonPalette();
    drawPizza(oCtx, pSize/2, pSize/2, r, pal);
    return {
      off, oCtx, r, y, pal,
      x: -pSize/2 - randInt(0, W),  // staggered starts
      speedNoise: makeSmoother(0.025+Math.random()*.02, 15, 70),
    };
  }

  const pizzas = Array.from({length:PIZZA_COUNT}, (_,i) => makePizza(i));

  // =====================================================
  // TAPESTRY CANVAS
  // This is the slit scan output — a single offscreen canvas
  // the full width of the screen. Each frame we:
  //   1. Shift the entire tapestry one pixel to the right
  //   2. Plant the new slit column at the left edge (SLIT_X + 1)
  // Columns that drift off the right edge just disappear.
  // =====================================================
  const tapestry    = document.createElement('canvas');
  tapestry.width    = W;
  tapestry.height   = H;
  const tapestryCtx = tapestry.getContext('2d');

  // Fill with background to start
  tapestryCtx.fillStyle = BG_COLOR;
  tapestryCtx.fillRect(0, 0, W, H);

  // Temp canvas — composite live pizza feed for slit sampling
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width  = W;
  tempCanvas.height = H;
  const tempCtx     = tempCanvas.getContext('2d');

  // =====================================================
  // MAIN LOOP
  // =====================================================
  function frame() {

    slitMarker.style.left = SLIT_X + 'px';

    // --- Draw all pizzas to temp canvas (live feed) ---
    tempCtx.clearRect(0, 0, W, H);
    pizzas.forEach(p => {
      const speed = Math.max(0.15, 0.6 + p.speedNoise() * 2.2);
      p.x += speed;

      if (p.x - p.r > W + 30) {
        p.x   = -pSize/2 - randInt(0, 80);
        p.pal = makeNeonPalette();
        p.oCtx.clearRect(0, 0, pSize, pSize);
        drawPizza(p.oCtx, pSize/2, pSize/2, p.r, p.pal);
      }

      tempCtx.drawImage(p.off, Math.floor(p.x - pSize/2), Math.floor(p.y - pSize/2));
    });

    // --- Update tapestry ---
    // Step 1: shift the entire tapestry one pixel to the right
    // We do this by drawing it onto itself offset by 1px
    tapestryCtx.drawImage(tapestry, 1, 0);

    // Step 2: clear the leftmost column of the tapestry (at SLIT_X)
    // so we have a clean slot to plant the new sample
    tapestryCtx.clearRect(SLIT_X, 0, 1, H);

    // Step 3: grab the slit column from the live feed and plant it
    const slitData = tempCtx.getImageData(SLIT_X, 0, 1, H);
    tapestryCtx.putImageData(slitData, SLIT_X, 0);

    // --- Composite to main canvas ---
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, W, H);

    // Draw tapestry (right side of slit)
    ctx.save();
    ctx.beginPath();
    ctx.rect(SLIT_X, 0, W - SLIT_X, H);
    ctx.clip();
    ctx.drawImage(tapestry, 0, 0);
    ctx.restore();

    // Draw live pizzas clipped strictly to left of slit
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, SLIT_X, H);
    ctx.clip();
    pizzas.forEach(p => {
      ctx.drawImage(p.off, Math.floor(p.x - pSize/2), Math.floor(p.y - pSize/2));
    });
    ctx.restore();

    // Ghost slit line
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(SLIT_X, 0, 1, H);

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);

  window.addEventListener('resize', () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>
</body>
</html>
